name: apple_net
description: "Apple.NET - Yemeni internet hotspot card selling platform - Developed by QTBM DEV"
publish_to: 'none'
version: 2.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  shimmer: ^3.0.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  intl: ^0.20.2
  uuid: ^4.5.1
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  firebase_database: ^11.3.4
  firebase_messaging: ^15.2.4
  # Image & Media
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  # Connectivity & Utilities
  connectivity_plus: ^6.1.2
  package_info_plus: ^8.1.2
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  # Charts
  fl_chart: ^0.70.2
  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#1B7A3D"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
