plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

// ─── Keystore properties loaded from key.properties ───
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.applenet.app"
    compileSdk 35

    // ─── JDK Compatibility ───
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // ─── Kotlin JVM Target ───
    kotlinOptions {
        jvmTarget = "17"
    }

    // ─── Default Config ───
    defaultConfig {
        applicationId "com.applenet.app"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "2.1.0"
        multiDexEnabled true
    }

    // ─── Signing Configs ───
    signingConfigs {
        debug {
            storeFile = keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
            storePassword = keystoreProperties["storePassword"] ?: ""
            keyAlias = keystoreProperties["keyAlias"] ?: ""
            keyPassword = keystoreProperties["keyPassword"] ?: ""
        }
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
            }
        }
    }

    // ─── Build Types ───
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            debuggable true
        }
        profile {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            debuggable false
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            debuggable false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    // ─── Product Flavors (optional for future use) ───
    flavorDimensions "environment"
    productFlavors {
        production {
            dimension "environment"
            applicationId "com.applenet.app"
            resValue "string", "app_name", "Apple.NET"
        }
        staging {
            dimension "environment"
            applicationId "com.applenet.app.staging"
            resValue "string", "app_name", "Apple.NET (Staging)"
        }
    }

    // ─── Lint Options ───
    lintOptions {
        checkReleaseBuilds true
        abortOnError false
        disable "MissingTranslation"
    }

    // ─── Bundle Options ───
    bundle {
        language {
            enableSplit = true
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }
}

// ─── Flutter Source ───
flutter {
    source = "../.."
}

// ─── Dependencies ───
dependencies {
    implementation "androidx.multidex:multidex:2.0.1"
    implementation "androidx.core:core-ktx:1.15.0"
    implementation "androidx.appcompat:appcompat:1.7.0"
    implementation "com.google.android.material:material:1.12.0"
}
